name: Build blog
on:
  push:
    branches: [main]
  schedule:
    # GitHub schedule 常在整点积压 2–3 小时，故用 :20 分并提前覆盖上午窗口。
    # 目标：北京时间早上约 08:00 前后能更新到当天日报。
    - cron: '20 22 * * *'   # UTC 22:20 = BJ 06:20（提前跑，延迟后常落在 ~08:00）
    - cron: '20 0 * * *'    # UTC 00:20 = BJ 08:20
    - cron: '20 2 * * *'    # UTC 02:20 = BJ 10:20（上午兜底）
    - cron: '20 10 * * *'   # UTC 10:20 = BJ 18:20（晚间补跑）
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch AI HOT daily
        id: aihot
        run: |
          set +e
          python3 src/aihot.py
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          # 0=今天已写入；2=今天未就绪但已写入最近一期；其它=失败
          if [ "$code" -eq 1 ] || [ "$code" -gt 2 ]; then
            exit "$code"
          fi
          exit 0
      - name: Generate site
        run: python3 src/generator.py
      - name: Commit & push
        run: |
          git config user.name "blog-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "build: $(TZ=Asia/Shanghai date +%F)" || echo "no changes"
          git push
