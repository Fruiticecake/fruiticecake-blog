name: Build blog
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch AI HOT daily
        run: python3 src/aihot.py || true
      - name: Generate site
        run: python3 src/generator.py
      - name: Commit & push
        run: |
          git config user.name "blog-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "build: $(date +%F)" || echo "no changes"
          git push
