name: Build blog
on:
  push:
    branches: [main]
  schedule:
    # 北京时间 10:00
    - cron: '0 2 * * *'
    # 北京时间 18:00 补跑（防止上午日报尚未生成）
    - cron: '0 10 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch AI HOT daily
        id: aihot
        run: |
          set +e
          python3 src/aihot.py
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          # 0=今天已写入；2=今天未就绪但已写入最近一期；其它=失败
          if [ "$code" -eq 1 ] || [ "$code" -gt 2 ]; then
            exit "$code"
          fi
          exit 0
      - name: Generate site
        run: python3 src/generator.py
      - name: Commit & push
        run: |
          git config user.name "blog-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "build: $(TZ=Asia/Shanghai date +%F)" || echo "no changes"
          git push
